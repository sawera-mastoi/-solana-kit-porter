name: Validate Codemod Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Codemod CLI
        run: npm install -g codemod
      - name: Validate Workflow
        run: codemod workflow validate -w workflow.yaml
